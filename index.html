<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Audio MP3 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-2xl border border-gray-700">
        <div class="flex items-center justify-center gap-3 mb-6">
            <svg class="w-8 h-8 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
            <h1 class="text-3xl font-bold text-blue-400">Generador MP3</h1>
        </div>

        <div class="space-y-6">
            <div class="relative">
                <label class="block text-sm font-semibold mb-2 text-gray-300">¿Qué quieres que diga?</label>
                <textarea id="textInput" rows="5" 
                    class="w-full px-4 py-3 bg-gray-900 border border-gray-600 rounded-xl focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-white placeholder-gray-500 resize-none transition-colors" 
                    placeholder="Escribe tu texto aquí..."></textarea>
                <div class="absolute bottom-3 right-4 text-xs font-mono" id="charCount">
                    <span id="currentChars" class="text-gray-400">0</span>
                    <span class="text-gray-500">/ 200</span>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-gray-900/50 p-4 rounded-xl border border-gray-700">
                    <label class="block text-sm font-semibold mb-2 text-blue-300 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"></path></svg>
                        Idioma de Descarga (MP3)
                    </label>
                    <select id="langSelect" class="w-full px-3 py-2 bg-gray-800 border border-gray-600 rounded-lg focus:outline-none focus:border-blue-500 text-sm text-gray-200 cursor-pointer">
                        <option value="es">Español</option>
                        <option value="en">Inglés</option>
                        <option value="pt">Portugués</option>
                        <option value="fr">Francés</option>
                        <option value="it">Italiano</option>
                        <option value="de">Alemán</option>
                        <option value="ja">Japonés</option>
                    </select>
                    <p class="text-[10px] text-gray-500 mt-2 leading-tight">La voz descargada usará la voz estándar de Google para este idioma.</p>
                </div>

                <div class="bg-gray-900/50 p-4 rounded-xl border border-gray-700">
                    <label class="block text-sm font-semibold mb-2 text-green-300 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path></svg>
                        Voz de Prueba Local
                    </label>
                    <select id="voiceSelect" class="w-full px-3 py-2 bg-gray-800 border border-gray-600 rounded-lg focus:outline-none focus:border-green-500 text-sm text-gray-200 cursor-pointer">
                        <option value="">Cargando voces del sistema...</option>
                    </select>
                    <p class="text-[10px] text-gray-500 mt-2 leading-tight">Usa las voces instaladas en tu PC/Móvil solo para escuchar cómo suena.</p>
                </div>
            </div>

            <div class="flex flex-col sm:flex-row gap-3 pt-4">
                <button id="btnPlay" class="flex-1 bg-green-600 hover:bg-green-500 text-white font-bold py-3 px-4 rounded-xl transition-all duration-200 flex items-center justify-center gap-2 shadow-lg shadow-green-900/20 active:scale-95">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    Probar Texto
                </button>

                <button id="btnStop" class="bg-gray-600 hover:bg-gray-500 text-white font-bold py-3 px-4 rounded-xl transition-all duration-200 flex items-center justify-center gap-2 active:scale-95">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"></path></svg>
                </button>

                <button id="btnDownload" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-xl transition-all duration-200 flex items-center justify-center gap-2 shadow-lg shadow-blue-900/20 active:scale-95">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Generar y Descargar MP3
                </button>
            </div>

            <div id="alertBox" class="hidden rounded-lg p-4 text-sm font-medium text-center border"></div>
        </div>
    </div>

    <script>
        const textInput = document.getElementById('textInput');
        const voiceSelect = document.getElementById('voiceSelect');
        const langSelect = document.getElementById('langSelect');
        const btnPlay = document.getElementById('btnPlay');
        const btnStop = document.getElementById('btnStop');
        const btnDownload = document.getElementById('btnDownload');
        const currentChars = document.getElementById('currentChars');
        const alertBox = document.getElementById('alertBox');

        let synthVoices = [];
        const MAX_CHARS = 200;

        // Contador de caracteres dinámico
        textInput.addEventListener('input', (e) => {
            const length = e.target.value.length;
            currentChars.textContent = length;
            
            if (length > MAX_CHARS) {
                currentChars.classList.replace('text-gray-400', 'text-red-400');
                textInput.classList.replace('border-gray-600', 'border-red-500');
            } else {
                currentChars.classList.replace('text-red-400', 'text-gray-400');
                textInput.classList.replace('border-red-500', 'border-gray-600');
            }
        });

        // Cargar voces locales
        function loadVoices() {
            synthVoices = window.speechSynthesis.getVoices();
            if (synthVoices.length > 0) {
                voiceSelect.innerHTML = '';
                
                // Ordenar voces por nombre para que quede prolijo
                synthVoices.sort((a, b) => a.name.localeCompare(b.name));
                
                synthVoices.forEach((voice, index) => {
                    const option = document.createElement('option');
                    option.value = index;
                    option.textContent = `${voice.name} [${voice.lang}]`;
                    if (voice.lang.startsWith('es') && voice.default) {
                        option.selected = true;
                    }
                    voiceSelect.appendChild(option);
                });
            }
        }

        window.speechSynthesis.onvoiceschanged = loadVoices;
        setTimeout(loadVoices, 500); // Fallback por si onvoiceschanged no dispara en algunos navegadores

        // Mostrar Alertas
        function showAlert(msg, type = 'error') {
            alertBox.textContent = msg;
            alertBox.classList.remove('hidden', 'bg-red-900/50', 'text-red-300', 'border-red-800', 'bg-green-900/50', 'text-green-300', 'border-green-800');
            
            if (type === 'error') {
                alertBox.classList.add('bg-red-900/50', 'text-red-300', 'border-red-800');
            } else {
                alertBox.classList.add('bg-green-900/50', 'text-green-300', 'border-green-800');
            }
            
            setTimeout(() => alertBox.classList.add('hidden'), 4000);
        }

        // Reproducir audio local
        btnPlay.addEventListener('click', () => {
            const text = textInput.value.trim();
            if (!text) return showAlert('Por favor, escribe un texto para reproducir.');
            
            window.speechSynthesis.cancel(); 
            const utterance = new SpeechSynthesisUtterance(text);
            const selectedVoiceIndex = voiceSelect.value;
            
            if (selectedVoiceIndex && synthVoices[selectedVoiceIndex]) {
                utterance.voice = synthVoices[selectedVoiceIndex];
            }
            
            window.speechSynthesis.speak(utterance);
        });

        // Detener audio local
        btnStop.addEventListener('click', () => {
            window.speechSynthesis.cancel();
        });

        // Generar y descargar el MP3 real
        btnDownload.addEventListener('click', () => {
            const text = textInput.value.trim();
            
            if (!text) return showAlert('No hay texto para descargar.');
            if (text.length > MAX_CHARS) return showAlert(`El límite para descargar es de ${MAX_CHARS} caracteres. Tienes ${text.length}.`, 'error');

            const langCode = langSelect.value;
            const encodedText = encodeURIComponent(text);
            
            // Construimos la URL de la API no oficial
            const url = `https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=${langCode}&q=${encodedText}`;

            // Técnica para forzar la descarga en el navegador
            const link = document.createElement('a');
            link.href = url;
            link.download = `Audio_${langCode}_${Date.now()}.mp3`;
            link.target = "_blank"; // Por seguridad de CORS, si no lo descarga directo, abre el reproductor
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            showAlert('Descarga iniciada. Si se abre una pestaña nueva, haz clic derecho -> "Guardar audio como..."', 'success');
        });
    </script>
</body>
</html>
