<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Audio MP3</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-4">

    <div class="bg-gray-800 p-8 rounded-xl shadow-2xl w-full max-w-lg border border-gray-700">
        <h1 class="text-2xl font-bold mb-6 text-center text-blue-400">Texto a Voz (MP3)</h1>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1 text-gray-300">Texto a convertir:</label>
                <textarea id="textInput" rows="4" 
                    class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:outline-none focus:border-blue-500 text-white placeholder-gray-400 resize-none" 
                    placeholder="Escribe algo aquí... (Max ~200 caracteres para el MP3)"></textarea>
            </div>

            <div>
                <label class="block text-sm font-medium mb-1 text-gray-300">Voz de previsualización (Navegador):</label>
                <select id="voiceSelect" 
                    class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:outline-none focus:border-blue-500 text-white appearance-none">
                    <option value="">Cargando voces...</option>
                </select>
            </div>

            <div class="flex gap-3 pt-4">
                <button id="btnPlay" 
                    class="flex-1 bg-gray-600 hover:bg-gray-500 text-white font-semibold py-2 px-4 rounded-lg transition duration-200">
                    Escuchar Pruebita
                </button>
                <button id="btnDownload" 
                    class="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-semibold py-2 px-4 rounded-lg transition duration-200 flex items-center justify-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Descargar MP3
                </button>
            </div>
            
            <p id="statusMsg" class="text-xs text-center text-red-400 mt-2 hidden"></p>
        </div>
    </div>

    <script>
        const textInput = document.getElementById('textInput');
        const voiceSelect = document.getElementById('voiceSelect');
        const btnPlay = document.getElementById('btnPlay');
        const btnDownload = document.getElementById('btnDownload');
        const statusMsg = document.getElementById('statusMsg');

        let voices = [];

        // Cargar las voces nativas del navegador
        function loadVoices() {
            voices = window.speechSynthesis.getVoices();
            if (voices.length > 0) {
                voiceSelect.innerHTML = '';
                voices.forEach((voice, index) => {
                    const option = document.createElement('option');
                    option.value = index;
                    option.textContent = `${voice.name} (${voice.lang})`;
                    // Seleccionar una voz en español por defecto si existe
                    if(voice.lang.includes('es')) option.selected = true;
                    voiceSelect.appendChild(option);
                });
            }
        }

        // Algunos navegadores cargan las voces de forma asíncrona
        window.speechSynthesis.onvoiceschanged = loadVoices;
        loadVoices();

        // Función para reproducir el audio en el navegador
        btnPlay.addEventListener('click', () => {
            const text = textInput.value.trim();
            if (!text) return showMsg('Escribe algo primero.');
            
            window.speechSynthesis.cancel(); // Detener si hay algo sonando
            const utterance = new SpeechSynthesisUtterance(text);
            const selectedVoiceIndex = voiceSelect.value;
            
            if (selectedVoiceIndex) {
                utterance.voice = voices[selectedVoiceIndex];
            }
            window.speechSynthesis.speak(utterance);
            showMsg('');
        });

        // Función para generar y descargar el MP3 usando Google Translate API (No oficial)
        btnDownload.addEventListener('click', () => {
            const text = textInput.value.trim();
            if (!text) return showMsg('Escribe algo para descargar.');
            
            // Limitación de la API gratuita de Google
            if (text.length > 200) {
                showMsg('El texto es muy largo para descargar (máx 200 caracteres).');
                return;
            }

            // Detectar el idioma seleccionado en el select para aplicarlo al MP3
            let langCode = 'es'; 
            const selectedVoiceIndex = voiceSelect.value;
            if (selectedVoiceIndex && voices[selectedVoiceIndex]) {
                // Extraer solo los primeros 2 caracteres del lang (ej. 'es-ES' -> 'es')
                langCode = voices[selectedVoiceIndex].lang.substring(0, 2);
            }

            // Construir la URL del endpoint de Google
            const encodedText = encodeURIComponent(text);
            const url = `https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=${langCode}&q=${encodedText}`;

            // Crear un elemento <a> invisible para forzar la descarga
            const a = document.createElement('a');
            a.href = url;
            a.download = `audio_${Date.now()}.mp3`; 
            // Nota: Al ser una URL externa, algunos navegadores abrirán el reproductor en vez de descargar directamente.
            // En ese caso, el usuario puede darle click derecho -> Guardar audio como.
            a.target = "_blank"; 
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            showMsg('');
        });

        function showMsg(msg) {
            if (msg) {
                statusMsg.textContent = msg;
                statusMsg.classList.remove('hidden');
            } else {
                statusMsg.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
