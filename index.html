<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador MP3 + Backend Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center justify-center p-4 font-sans">

    <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-2xl border border-gray-700">
        <div class="flex items-center justify-center gap-3 mb-6">
            <svg class="w-8 h-8 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
            <h1 class="text-3xl font-bold text-blue-400">Generador MP3</h1>
        </div>

        <div class="space-y-6">
            <div class="relative">
                <label class="block text-sm font-semibold mb-2 text-gray-300">¿Qué quieres que diga?</label>
                <textarea id="textInput" rows="5" 
                    class="w-full px-4 py-3 bg-gray-900 border border-gray-600 rounded-xl focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-white placeholder-gray-500 resize-none transition-colors" 
                    placeholder="Escribe tu texto aquí..."></textarea>
                <div class="absolute bottom-3 right-4 text-xs font-mono" id="charCount">
                    <span id="currentChars" class="text-gray-400">0</span>
                    <span class="text-gray-500">/ 200</span>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-gray-900/50 p-4 rounded-xl border border-gray-700">
                    <label class="block text-sm font-semibold mb-2 text-blue-300">Idioma de Descarga (MP3)</label>
                    <select id="langSelect" class="w-full px-3 py-2 bg-gray-800 border border-gray-600 rounded-lg focus:outline-none focus:border-blue-500 text-sm text-gray-200">
                        <option value="es">Español</option>
                        <option value="en">Inglés</option>
                        <option value="pt">Portugués</option>
                        <option value="fr">Francés</option>
                        <option value="it">Italiano</option>
                    </select>
                </div>

                <div class="bg-gray-900/50 p-4 rounded-xl border border-gray-700">
                    <label class="block text-sm font-semibold mb-2 text-green-300">Voz de Prueba Local</label>
                    <select id="voiceSelect" class="w-full px-3 py-2 bg-gray-800 border border-gray-600 rounded-lg focus:outline-none focus:border-green-500 text-sm text-gray-200">
                        <option value="">Cargando voces...</option>
                    </select>
                </div>
            </div>

            <div class="flex flex-col sm:flex-row gap-3 pt-4">
                <button id="btnPlay" class="flex-1 bg-green-600 hover:bg-green-500 text-white font-bold py-3 px-4 rounded-xl transition-all">
                    Probar Texto
                </button>
                <button id="btnStop" class="bg-gray-600 hover:bg-gray-500 text-white font-bold py-3 px-4 rounded-xl transition-all">
                    ⏹
                </button>
                <button id="btnDownload" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-xl transition-all">
                    Descargar MP3
                </button>
            </div>

            <div id="alertBox" class="hidden rounded-lg p-4 text-sm font-medium text-center border"></div>
        </div>

        <hr class="my-8 border-gray-700">

        <div class="bg-gray-900/80 p-5 rounded-xl border border-gray-700">
            <h2 class="text-lg font-bold text-purple-400 mb-3 text-center">Prueba de Web Service (Backend)</h2>
            <button id="btnTestBackend" class="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold py-3 px-4 rounded-xl transition-all shadow-lg shadow-purple-900/20 active:scale-95">
                Verificar conexión con Express
            </button>
            <p id="backendResponse" class="text-sm text-green-400 mt-4 hidden text-center bg-gray-800 py-2 rounded-lg border border-green-800"></p>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. LÓGICA DEL GENERADOR TTS
        // ==========================================
        const textInput = document.getElementById('textInput');
        const voiceSelect = document.getElementById('voiceSelect');
        const langSelect = document.getElementById('langSelect');
        const btnPlay = document.getElementById('btnPlay');
        const btnStop = document.getElementById('btnStop');
        const btnDownload = document.getElementById('btnDownload');
        const currentChars = document.getElementById('currentChars');
        const alertBox = document.getElementById('alertBox');
        
        let synthVoices = [];
        const MAX_CHARS = 200;

        // Contador
        textInput.addEventListener('input', (e) => {
            const length = e.target.value.length;
            currentChars.textContent = length;
            if (length > MAX_CHARS) {
                currentChars.classList.replace('text-gray-400', 'text-red-400');
                textInput.classList.replace('border-gray-600', 'border-red-500');
            } else {
                currentChars.classList.replace('text-red-400', 'text-gray-400');
                textInput.classList.replace('border-red-500', 'border-gray-600');
            }
        });

        // Cargar Voces
        function loadVoices() {
            synthVoices = window.speechSynthesis.getVoices();
            if (synthVoices.length > 0) {
                voiceSelect.innerHTML = '';
                synthVoices.sort((a, b) => a.name.localeCompare(b.name));
                synthVoices.forEach((voice, index) => {
                    const option = document.createElement('option');
                    option.value = index;
                    option.textContent = `${voice.name} [${voice.lang}]`;
                    if (voice.lang.startsWith('es') && voice.default) option.selected = true;
                    voiceSelect.appendChild(option);
                });
            }
        }
        window.speechSynthesis.onvoiceschanged = loadVoices;
        setTimeout(loadVoices, 500);

        function showAlert(msg, type = 'error') {
            alertBox.textContent = msg;
            alertBox.className = `rounded-lg p-4 text-sm font-medium text-center border mt-4 ${type === 'error' ? 'bg-red-900/50 text-red-300 border-red-800' : 'bg-green-900/50 text-green-300 border-green-800'}`;
            setTimeout(() => alertBox.classList.add('hidden'), 4000);
        }

        // Reproducir
        btnPlay.addEventListener('click', () => {
            const text = textInput.value.trim();
            if (!text) return showAlert('Escribe un texto.');
            window.speechSynthesis.cancel(); 
            const utterance = new SpeechSynthesisUtterance(text);
            if (voiceSelect.value && synthVoices[voiceSelect.value]) {
                utterance.voice = synthVoices[voiceSelect.value];
            }
            window.speechSynthesis.speak(utterance);
        });

        // Detener
        btnStop.addEventListener('click', () => window.speechSynthesis.cancel());

        // Descargar
        btnDownload.addEventListener('click', () => {
            const text = textInput.value.trim();
            if (!text) return showAlert('No hay texto para descargar.');
            if (text.length > MAX_CHARS) return showAlert('Límite de 200 caracteres superado.', 'error');

            const url = `https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=${langSelect.value}&q=${encodeURIComponent(text)}`;
            const link = document.createElement('a');
            link.href = url;
            link.download = `Audio_${langSelect.value}_${Date.now()}.mp3`;
            link.target = "_blank";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });


        // ==========================================
        // 2. LÓGICA DE CONEXIÓN CON EL BACKEND
        // ==========================================
        const btnTestBackend = document.getElementById('btnTestBackend');
        const backendResponse = document.getElementById('backendResponse');

        // 🔥 ¡ATENCIÓN! Cambiá esta URL cuando subas el backend a Render 🔥
        // Ejemplo: const BACKEND_URL = 'https://mi-tts-backend.onrender.com/api/estado';
        const BACKEND_URL = 'http://audiodw.onrender.com/api/estado';

        btnTestBackend.addEventListener('click', async () => {
            backendResponse.textContent = "Haciendo ping al servidor... (Puede tardar 50s si Render estaba en reposo)";
            backendResponse.className = "text-sm text-yellow-400 mt-4 text-center bg-gray-800 py-2 rounded-lg border border-yellow-800 block";

            try {
                const response = await fetch(BACKEND_URL);
                if (!response.ok) throw new Error('Error en la respuesta del servidor');
                const data = await response.json();
                
                // Mostrar éxito
                backendResponse.textContent = `✅ ${data.mensaje}`;
                backendResponse.className = "text-sm text-green-400 mt-4 text-center bg-gray-800 py-2 rounded-lg border border-green-800 block";
            } catch (error) {
                // Mostrar error
                backendResponse.textContent = "❌ Error de conexión. Verificá que el Web Service esté corriendo y la URL sea la correcta.";
                backendResponse.className = "text-sm text-red-400 mt-4 text-center bg-gray-800 py-2 rounded-lg border border-red-800 block";
            }
        });
    </script>
</body>
</html>
