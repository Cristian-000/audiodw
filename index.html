<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudio de Ecualización MP3 - Consola Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.all.min.js"></script>
</head>
<body class="bg-gray-950 text-gray-200 min-h-screen flex items-center justify-center p-2 font-mono selection:bg-blue-600">

    <div class="bg-gray-900 border border-gray-700 w-full max-w-2xl p-4 shadow-none">
        <div class="flex items-center justify-between border-b border-gray-700 pb-2 mb-4">
            <div class="flex items-center gap-2">
                <span class="w-3 h-3 bg-blue-500 inline-block"></span>
                <h1 class="text-md font-bold uppercase tracking-wider text-blue-400">Audio Studio Workspace</h1>
            </div>
            <span class="text-[10px] text-gray-500">v2.1.0-PRO</span>
        </div>

        <div class="flex border border-gray-700 p-0.5 mb-4 bg-gray-950">
            <button id="tabText" class="flex-1 py-1.5 text-xs font-bold uppercase rounded-none bg-blue-600 text-white transition-all">
                [1] Texto a Voz
            </button>
            <button id="tabUpload" class="flex-1 py-1.5 text-xs font-bold uppercase rounded-none text-gray-500 hover:text-gray-300 transition-all">
                [2] Archivo Local
            </button>
        </div>

        <div class="space-y-4">
            <div id="panelText" class="block space-y-3">
                <div class="relative">
                    <label class="block text-[11px] uppercase tracking-wider text-gray-400 mb-1">Módulo de Entrada de Texto:</label>
                    <textarea id="textInput" rows="3" 
    class="w-full px-3 py-2 bg-gray-900 border border-gray-700 rounded-none focus:outline-none focus:border-blue-500 text-xs text-white placeholder-gray-600 resize-none transition-colors" 
    placeholder="Ingresar caracteres a procesar..."></textarea>

                    <div class="absolute bottom-2 right-3 text-[10px] font-mono text-gray-600">
                        <span id="currentChars">0</span>/200
                    </div>
                </div>

                <div>
                    <label class="block text-[11px] uppercase tracking-wider text-gray-400 mb-1">Configuración Regional Voz:</label>
                    <select id="langSelect" class="w-full px-3 py-2 bg-gray-950 border border-gray-700 rounded-none text-xs text-white outline-none focus:border-blue-500">
                        <optgroup label="Español" class="bg-gray-900 text-blue-400">
                            <option value="es-ES">España (Peninsular)</option>
                            <option value="es-MX">México (Latinoamérica)</option>
                            <option value="es-US">EE.UU. (Neutro)</option>
                            <option value="es-AR">Argentina</option>
                            <option value="es-CL">Chile</option>
                            <option value="es-CO">Colombia</option>
                        </optgroup>
                        <optgroup label="Inglés" class="bg-gray-900 text-blue-400">
                            <option value="en-US">EE.UU. (General)</option>
                            <option value="en-GB">Reino Unido (Británico)</option>
                            <option value="en-AU">Australia</option>
                        </optgroup>
                    </select>
                </div>
            </div>

            <div id="panelUpload" class="hidden">
                <label class="block text-[11px] uppercase tracking-wider text-gray-400 mb-1">Carga Física de Archivo:</label>
                <label class="flex flex-col items-center justify-center w-full h-24 border border-gray-700 border-dashed rounded-none cursor-pointer bg-gray-950 hover:bg-gray-900/40 transition-colors">
                    <span class="text-xs text-gray-500 uppercase tracking-widest" id="uploadLabel">Seleccionar pista binaria (MP3, WAV)</span>
                    <input id="fileInput" type="file" accept="audio/*" class="hidden" />
                </label>
            </div>

            <div class="border border-gray-700 p-3 space-y-3 bg-gray-950/40">
                <div class="border-b border-gray-800 pb-2 space-y-2">
                    <h3 class="text-xs font-bold uppercase tracking-wider text-blue-400">Rack de Procesamiento</h3>
                    <div class="flex items-center gap-2 text-[11px] bg-gray-950 p-2 border border-gray-800 w-full">
                        <span class="text-gray-500 uppercase">Preset activo:</span>
                        <select id="presetSelect" class="bg-gray-900 border border-gray-700 px-2 py-1 text-white text-[11px] rounded-none outline-none focus:border-blue-500 flex-1">
                            <option value="plano">Plano (Sin Efectos)</option>
                            <option value="locutor">Locutor Pro (Graves Estables)</option>
                            <option value="clara">Voz Clara (Brillo Nítido)</option>
                            <option value="radio">Radio AM (Filtro Telefónico)</option>
                            <option value="ardilla">Modo Ardilla (Agudo/Rápido)</option>
                            <option value="tumba">Ultratumba (Profundo/Eco)</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-3 gap-2 text-[11px]">
                    <div class="bg-gray-950 p-2 border border-gray-800">
                        <div class="flex justify-between mb-1 text-gray-400">
                            <span>GRAVES</span>
                            <span id="bassVal" class="text-blue-400">0 dB</span>
                        </div>
                        <input type="range" id="sliderBass" min="-20" max="20" value="0" class="w-full accent-blue-500 h-1 bg-gray-800 appearance-none outline-none cursor-pointer">
                    </div>
                    <div class="bg-gray-950 p-2 border border-gray-800">
                        <div class="flex justify-between mb-1 text-gray-400">
                            <span>AGUDOS</span>
                            <span id="trebleVal" class="text-blue-400">0 dB</span>
                        </div>
                        <input type="range" id="sliderTreble" min="-20" max="20" value="0" class="w-full accent-blue-500 h-1 bg-gray-800 appearance-none outline-none cursor-pointer">
                    </div>
                    <div class="bg-gray-950 p-2 border border-gray-800">
                        <div class="flex justify-between mb-1 text-gray-400">
                            <span>VELOCIDAD</span>
                            <span id="speedVal" class="text-blue-400">1.0x</span>
                        </div>
                        <input type="range" id="sliderSpeed" min="0.5" max="2.0" step="0.1" value="1.0" class="w-full accent-blue-500 h-1 bg-gray-800 appearance-none outline-none cursor-pointer">
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-3 gap-2 text-[11px]">
                    <div class="bg-gray-950 p-2 border border-gray-800">
                        <div class="flex justify-between mb-1 text-gray-400">
                            <span>TIEMPO ECO</span>
                            <span id="echoVal" class="text-blue-400">0.0s</span>
                        </div>
                        <input type="range" id="sliderEcho" min="0" max="1.0" step="0.05" value="0" class="w-full accent-blue-500 h-1 bg-gray-800 appearance-none outline-none cursor-pointer">
                    </div>
                    <div class="bg-gray-950 p-2 border border-gray-800">
                        <div class="flex justify-between mb-1 text-gray-400">
                            <span>FEEDBACK ECO</span>
                            <span id="feedbackVal" class="text-blue-400">0%</span>
                        </div>
                        <input type="range" id="sliderFeedback" min="0" max="90" step="5" value="0" class="w-full accent-blue-500 h-1 bg-gray-800 appearance-none outline-none cursor-pointer">
                    </div>
                    <div class="bg-gray-950 p-2 border border-gray-800">
                        <div class="flex justify-between mb-1 text-gray-400">
                            <span>GANANCIA MASTER</span>
                            <span id="volumeVal" class="text-blue-400">100%</span>
                        </div>
                        <input type="range" id="sliderVolume" min="0" max="200" value="100" class="w-full accent-blue-500 h-1 bg-gray-800 appearance-none outline-none cursor-pointer">
                    </div>
                </div>
            </div>

            <div class="bg-gray-950 p-2 border border-gray-700 flex flex-col sm:flex-row sm:items-center gap-2 text-[11px]">
                <label class="uppercase font-bold text-gray-400 whitespace-nowrap">Nombre de salida (.mp3):</label>
                <input type="text" id="fileNameInput" placeholder="audio_salida_master" 
                    class="flex-1 px-2 py-1 bg-gray-900 border border-gray-700 rounded-none text-xs text-white outline-none focus:border-blue-500 font-mono">
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-3 gap-2">
                <button id="btnPlay" class="bg-gray-950 border border-green-700 text-green-400 text-xs font-bold py-2.5 uppercase tracking-wider rounded-none hover:bg-green-950/40 transition-all">
                    [► RUN PREVIEW]
                </button>
                <button id="btnStop" class="bg-gray-950 border border-gray-700 text-gray-400 text-xs font-bold py-2.5 uppercase tracking-wider rounded-none hover:bg-gray-800/40 transition-all">
                    [■ STOP]
                </button>
                <button id="btnDownload" class="bg-blue-600 text-white text-xs font-bold py-2.5 uppercase tracking-wider rounded-none hover:bg-blue-500 transition-all shadow-none">
                    [💾 COMPILAR MP3]
                </button>
            </div>

            <div id="alertBox" class="hidden p-2 border text-xs font-mono"></div>

            <button id="btnTestBackend" class="w-full bg-gray-950 border border-gray-800 text-gray-500 text-[10px] py-1.5 uppercase hover:text-gray-400 transition-all rounded-none">
                Consola: Comprobar Enlace Servidor Remoto (Ping)
            </button>
        </div>
    </div>

    <script>
        const tabText = document.getElementById('tabText');
        const tabUpload = document.getElementById('tabUpload');
        const panelText = document.getElementById('panelText');
        const panelUpload = document.getElementById('panelUpload');
        
        const textInput = document.getElementById('textInput');
        const currentChars = document.getElementById('currentChars');
        const langSelect = document.getElementById('langSelect');
        const fileInput = document.getElementById('fileInput');
        const uploadLabel = document.getElementById('uploadLabel');
        const fileNameInput = document.getElementById('fileNameInput');
        
        const presetSelect = document.getElementById('presetSelect');
        const sliderBass = document.getElementById('sliderBass');
        const sliderTreble = document.getElementById('sliderTreble');
        const sliderSpeed = document.getElementById('sliderSpeed');
        const sliderEcho = document.getElementById('sliderEcho');
        const sliderFeedback = document.getElementById('sliderFeedback');
        const sliderVolume = document.getElementById('sliderVolume');

        const bassVal = document.getElementById('bassVal');
        const trebleVal = document.getElementById('trebleVal');
        const speedVal = document.getElementById('speedVal');
        const echoVal = document.getElementById('echoVal');
        const feedbackVal = document.getElementById('feedbackVal');
        const volumeVal = document.getElementById('volumeVal');

        const btnPlay = document.getElementById('btnPlay');
        const btnStop = document.getElementById('btnStop');
        const btnDownload = document.getElementById('btnDownload');
        const btnTestBackend = document.getElementById('btnTestBackend');
        const alertBox = document.getElementById('alertBox');

        const BASE_SERVER_URL = 'https://audiodw.onrender.com';
        
        let modoActual = 'texto'; 
        let nodoReproduccionActivo = null;
        let contextoAudioNativo = null;
        let archivoCargadoBuffer = null;

        // --- Persistencia con LocalStorage ---
        function guardarEstadoEnStorage() {
            const estado = {
                texto: textInput.value,
                idioma: langSelect.value,
                nombreArchivo: fileNameInput.value,
                preset: presetSelect.value,
                bass: sliderBass.value,
                treble: sliderTreble.value,
                speed: sliderSpeed.value,
                echo: sliderEcho.value,
                feedback: sliderFeedback.value,
                volume: sliderVolume.value
            };
            localStorage.setItem('audio_studio_state', JSON.stringify(estado));
        }

        function cargarEstadoDesdeStorage() {
            const copia = localStorage.getItem('audio_studio_state');
            if (!copia) return;
            try {
                const estado = JSON.parse(copia);
                textInput.value = estado.texto || '';
                langSelect.value = estado.idioma || 'es-ES';
                fileNameInput.value = estado.nombreArchivo || '';
                presetSelect.value = estado.preset || 'plano';
                sliderBass.value = estado.bass || 0;
                sliderTreble.value = estado.treble || 0;
                sliderSpeed.value = estado.speed || 1.0;
                sliderEcho.value = estado.echo || 0;
                sliderFeedback.value = estado.feedback || 0;
                sliderVolume.value = estado.volume || 100;
                currentChars.textContent = textInput.value.length;
                actualizarVisualizacionSliders();
            } catch(e) { console.error("Error leyendo LocalStorage", e); }
        }

        // --- Eventos de Cambio de Pestañas ---
        tabText.addEventListener('click', () => {
            modoActual = 'texto';
            tabText.className = "flex-1 py-1.5 text-xs font-bold uppercase rounded-none bg-blue-600 text-white transition-all";
            tabUpload.className = "flex-1 py-1.5 text-xs font-bold uppercase rounded-none text-gray-500 hover:text-gray-300 transition-all";
            panelText.classList.remove('hidden');
            panelUpload.classList.add('hidden');
            detenerAudioNativo();
        });

        tabUpload.addEventListener('click', () => {
            modoActual = 'subir';
            tabUpload.className = "flex-1 py-1.5 text-xs font-bold uppercase rounded-none bg-blue-600 text-white transition-all";
            tabText.className = "flex-1 py-1.5 text-xs font-bold uppercase rounded-none text-gray-500 hover:text-gray-300 transition-all";
            panelUpload.classList.remove('hidden');
            panelText.classList.add('hidden');
            detenerAudioNativo();
        });

        // --- Carga de archivos binarios locales ---
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            uploadLabel.textContent = `RAW DATA: ${file.name.toUpperCase()}`;
            
            const nombreLimpio = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
            fileNameInput.value = nombreLimpio + "_master";
            guardarEstadoEnStorage();
            
            const reader = new FileReader();
            reader.onload = async (event) => {
                try {
                    if (!contextoAudioNativo) contextoAudioNativo = new (window.AudioContext || window.webkitAudioContext)();
                    archivoCargadoBuffer = await contextoAudioNativo.decodeAudioData(event.target.result);
                    showAlert('Archivo decodificado correctamente en búfer local.', 'success');
                } catch (err) {
                    showAlert('Error en decodificación binaria de pista.', 'error');
                }
            };
            reader.readAsArrayBuffer(file);
        });

        textInput.addEventListener('input', (e) => {
            const len = e.target.value.length;
            currentChars.textContent = len;
            guardarEstadoEnStorage();
            if (len > 200) {
                currentChars.className = "text-red-500";
                textInput.classList.replace('border-gray-700', 'border-red-500');
            } else {
                currentChars.className = "text-gray-600";
                textInput.classList.replace('border-red-500', 'border-gray-700');
            }
        });

        // --- Configuración de Presets de Ecualización ---
        const diccionarioPresets = {
            plano: { bass: 0, treble: 0, speed: 1.0, echo: 0, feedback: 0, volume: 100 },
            locutor: { bass: 14, treble: 3, speed: 1.0, echo: 0, feedback: 0, volume: 115 },
            clara: { bass: -7, treble: 12, speed: 1.0, echo: 0, feedback: 0, volume: 100 },
            radio: { bass: -16, treble: 14, speed: 1.0, echo: 0.10, feedback: 10, volume: 95 },
            ardilla: { bass: -10, treble: 8, speed: 1.4, echo: 0, feedback: 0, volume: 100 },
            tumba: { bass: 15, treble: -12, speed: 0.75, echo: 0.30, feedback: 30, volume: 120 }
        };

        presetSelect.addEventListener('change', (e) => {
            const config = diccionarioPresets[e.target.value];
            if (config) {
                sliderBass.value = config.bass;
                sliderTreble.value = config.treble;
                sliderSpeed.value = config.speed;
                sliderEcho.value = config.echo;
                sliderFeedback.value = config.feedback;
                sliderVolume.value = config.volume;
                actualizarVisualizacionSliders();
                guardarEstadoEnStorage();
            }
        });

        function actualizarVisualizacionSliders() {
            bassVal.textContent = `${sliderBass.value > 0 ? '+' : ''}${sliderBass.value} dB`;
            trebleVal.textContent = `${sliderTreble.value > 0 ? '+' : ''}${sliderTreble.value} dB`;
            speedVal.textContent = `${sliderSpeed.value}x`;
            echoVal.textContent = `${sliderEcho.value}s`;
            feedbackVal.textContent = `${sliderFeedback.value}%`;
            volumeVal.textContent = `${sliderVolume.value}%`;
        }

        const triggerModificacionManual = () => { 
            presetSelect.value = 'personalizado'; 
            actualizarVisualizacionSliders(); 
            guardarEstadoEnStorage();
        };

        sliderBass.addEventListener('input', triggerModificacionManual);
        sliderTreble.addEventListener('input', triggerModificacionManual);
        sliderSpeed.addEventListener('input', triggerModificacionManual);
        sliderEcho.addEventListener('input', triggerModificacionManual);
        sliderFeedback.addEventListener('input', triggerModificacionManual);
        sliderVolume.addEventListener('input', triggerModificacionManual);

        langSelect.addEventListener('change', guardarEstadoEnStorage);
        fileNameInput.addEventListener('input', guardarEstadoEnStorage);

        function showAlert(msg, type = 'error') {
            alertBox.textContent = `[LOG] :: ${msg.toUpperCase()}`;
            alertBox.classList.remove('hidden');
            if (type === 'error') {
                alertBox.className = "mt-4 p-2 border bg-red-950/40 border-red-800 text-red-400 font-mono text-[11px] block";
            } else if (type === 'success') {
                alertBox.className = "mt-4 p-2 border bg-green-950/40 border-green-800 text-green-400 font-mono text-[11px] block";
            } else if (type === 'process') {
                alertBox.className = "mt-4 p-2 border bg-blue-950/40 border-blue-800 text-blue-400 font-mono text-[11px] block";
            } else {
                alertBox.className = "mt-4 p-2 border bg-yellow-950/40 border-yellow-800 text-yellow-400 font-mono text-[11px] block";
            }
            if (type !== 'process') setTimeout(() => alertBox.classList.add('hidden'), 5000);
        }

        async function obtenerAudioBufferBase() {
            if (modoActual === 'subir') {
                if (!archivoCargadoBuffer) throw new Error('Ninguna pista binaria cargada en el búfer.');
                return archivoCargadoBuffer;
            } else {
                const texto = textInput.value.trim();
                if (!texto) throw new Error('Entrada de texto vacía.');
                if (texto.length > 200) throw new Error('Supera el límite estricto de 200 caracteres.');
                
                showAlert('[1/3] Conectando a proxy de descarga remota...', 'process');
                
                const response = await fetch(`${BASE_SERVER_URL}/api/generar-mp3`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ texto, idioma: langSelect.value })
                });

                if (!response.ok) throw new Error('El canal del servidor rechazó la transferencia o sigue inactivo.');

                const arrayBuffer = await response.arrayBuffer();
                if (!contextoAudioNativo) contextoAudioNativo = new (window.AudioContext || window.webkitAudioContext)();
                return await contextoAudioNativo.decodeAudioData(arrayBuffer);
            }
        }

        // --- Grafo de efectos con Compresor Integrado contra Saturación ---
        function construirGrafoEfectos(ctx, sourceNode, bassG, trebG, speedG, echoT, feedG, volG) {
            sourceNode.playbackRate.value = parseFloat(speedG);

            const filtroGraves = ctx.createBiquadFilter();
            filtroGraves.type = "lowshelf";
            filtroGraves.frequency.value = 200;
            filtroGraves.gain.value = parseFloat(bassG);

            const filtroAgudos = ctx.createBiquadFilter();
            filtroAgudos.type = "highshelf";
            filtroAgudos.frequency.value = 3000;
            filtroAgudos.gain.value = parseFloat(trebG);

            const compresorDinamico = ctx.createDynamicsCompressor();
            compresorDinamico.threshold.value = -12; 
            compresorDinamico.knee.value = 8;        
            compresorDinamico.ratio.value = 10;      
            compresorDinamico.attack.value = 0.002;  
            compresorDinamico.release.value = 0.20;  

            const nodoGanancia = ctx.createGain();
            nodoGanancia.gain.value = parseFloat(volG) / 100;

            sourceNode.connect(filtroGraves);
            filtroGraves.connect(filtroAgudos);
            
            const delayTimeValue = parseFloat(echoT);
            if (delayTimeValue > 0) {
                const nodoDelay = ctx.createDelay();
                nodoDelay.delayTime.value = delayTimeValue;

                const nodoFeedback = ctx.createGain();
                nodoFeedback.gain.value = parseFloat(feedG) / 100;

                filtroAgudos.connect(nodoDelay);
                nodoDelay.connect(nodoFeedback);
                nodoFeedback.connect(nodoDelay);

                nodoDelay.connect(compresorDinamico);
            }

            filtroAgudos.connect(compresorDinamico);
            compresorDinamico.connect(nodoGanancia);
            
            return nodoGanancia;
        }

        // --- Ejecución del Preview Activo ---
        btnPlay.addEventListener('click', async () => {
            try {
                detenerAudioNativo();
                const bufferBase = await obtenerAudioBufferBase();
                showAlert('[2/3] Masterizando audio y ecualizando...', 'process');

                if (!contextoAudioNativo) contextoAudioNativo = new (window.AudioContext || window.webkitAudioContext)();
                
                nodoReproduccionActivo = contextoAudioNativo.createBufferSource();
                nodoReproduccionActivo.buffer = bufferBase;

                const nodoFinal = construirGrafoEfectos(
                    contextoAudioNativo, nodoReproduccionActivo,
                    sliderBass.value, sliderTreble.value, sliderSpeed.value,
                    sliderEcho.value, sliderFeedback.value, sliderVolume.value
                );

                nodoFinal.connect(contextoAudioNativo.destination);
                nodoReproduccionActivo.start(0);
                showAlert('Preview en ejecución continua.', 'success');
            } catch (err) {
                console.error(err);
                showAlert(err.message, 'error');
            }
        });

        function detenerAudioNativo() {
            if (nodoReproduccionActivo) {
                try { nodoReproduccionActivo.stop(); } catch(e){}
                nodoReproduccionActivo = null;
            }
        }
        btnStop.addEventListener('click', detenerAudioNativo);

        // --- Renderizado Offline y Codificación MP3 ---
        btnDownload.addEventListener('click', async () => {
            try {
                detenerAudioNativo();
                const bufferBase = await obtenerAudioBufferBase();
                
                showAlert('[2/3] Inicializando procesador offline balanceado...', 'process');

                const factorVelocidad = parseFloat(sliderSpeed.value);
                const muestrasTotalesAjustadas = Math.ceil(bufferBase.length / factorVelocidad);

                const offlineCtx = new OfflineAudioContext(
                    bufferBase.numberOfChannels,
                    muestrasTotalesAjustadas,
                    bufferBase.sampleRate
                );

                const fuenteOffline = offlineCtx.createBufferSource();
                fuenteOffline.buffer = bufferBase;

                const nodoFinalOffline = construirGrafoEfectos(
                    offlineCtx, fuenteOffline,
                    sliderBass.value, sliderTreble.value, sliderSpeed.value,
                    sliderEcho.value, sliderFeedback.value, sliderVolume.value
                );

                nodoFinalOffline.connect(offlineCtx.destination);
                fuenteOffline.start(0);
                
                const bufferRenderizado = await offlineCtx.startRendering();

                showAlert('[3/3] Iniciando compresión y codificación a flujo MP3...', 'process');
                
                const blobMP3 = codificarBufferAMP3(bufferRenderizado);
                
                const nombreSolicitado = fileNameInput.value.trim().replace(/[/\\?%*:|"<>]/g, '');
                const nombreFinal = nombreSolicitado || `output_master_${Date.now()}`;

                const urlDescarga = window.URL.createObjectURL(blobMP3);
                const elementoLink = document.createElement('a');
                elementoLink.href = urlDescarga;
                elementoLink.download = `${nombreFinal}.mp3`;
                document.body.appendChild(elementoLink);
                elementoLink.click();
                elementoLink.remove();
                window.URL.revokeObjectURL(urlDescarga);

                showAlert(`Exportación de "${nombreFinal.toUpperCase()}.MP3" exitosa.`, 'success');
            } catch (err) {
                console.error(err);
                showAlert(err.message, 'error');
            }
        });

        // --- Algoritmo de Conversión PCM a MP3 de Alta Fidelidad ---
        function codificarBufferAMP3(audioBuffer) {
            const canales = audioBuffer.numberOfChannels;
            const tazaMuestreo = audioBuffer.sampleRate;
            
            const encoderMp3 = new lamejs.Mp3Encoder(canales, tazaMuestreo, 128);
            const fragmentosMp3 = [];
            const tamañoBloque = 1152;

            if (canales === 1) {
                const datosFlotantes = audioBuffer.getChannelData(0);
                const pcmInt16 = new Int16Array(datosFlotantes.length);
                for (let i = 0; i < datosFlotantes.length; i++) {
                    let muestra = Math.max(-1, Math.min(1, datosFlotantes[i]));
                    pcmInt16[i] = muestra < 0 ? muestra * 0x8000 : muestra * 0x7FFF;
                }
                for (let i = 0; i < pcmInt16.length; i += tamañoBloque) {
                    let bloque = pcmInt16.subarray(i, i + tamañoBloque);
                    let mp3buf = encoderMp3.encodeBuffer(bloque);
                    if (mp3buf.length > 0) fragmentosMp3.push(mp3buf);
                }
            } else {
                const flotantesIzquierda = audioBuffer.getChannelData(0);
                const flotantesDerecha = audioBuffer.getChannelData(1);
                const pcmIzquierda = new Int16Array(flotantesIzquierda.length);
                const pcmDerecha = new Int16Array(flotantesDerecha.length);

                for (let i = 0; i < flotantesIzquierda.length; i++) {
                    let muestraI = Math.max(-1, Math.min(1, flotantesIzquierda[i]));
                    pcmIzquierda[i] = muestraI < 0 ? muestraI * 0x8000 : muestraI * 0x7FFF;
                    let muestraD = Math.max(-1, Math.min(1, flotantesDerecha[i]));
                    pcmDerecha[i] = muestraD < 0 ? muestraD * 0x8000 : muestraD * 0x7FFF;
                }
                for (let i = 0; i < pcmIzquierda.length; i += tamañoBloque) {
                    let bloqueI = pcmIzquierda.subarray(i, i + tamañoBloque);
                    let bloqueD = pcmDerecha.subarray(i, i + tamañoBloque);
                    let mp3buf = encoderMp3.encodeBuffer(bloqueI, bloqueD);
                    if (mp3buf.length > 0) fragmentosMp3.push(mp3buf);
                }
            }

            const flujoFinal = encoderMp3.flush();
            if (flujoFinal.length > 0) fragmentosMp3.push(flujoFinal);

            return new Blob(fragmentosMp3, { type: 'audio/mp3' });
        }

        // --- Ping de comprobación manual ---
        btnTestBackend.addEventListener('click', async () => {
            showAlert('Enviando ping de diagnóstico técnico a la instancia...', 'process');
            try {
                const response = await fetch(`${BASE_SERVER_URL}/api/estado`);
                if (!response.ok) throw new Error();
                const data = await response.json();
                showAlert(`Enlace verificado de forma exitosa: ${data.mensaje}`, 'success');
            } catch {
                showAlert('Fallo de respuesta crítica de enlace en la dirección configurada.', 'error');
            }
        });

        // Inicialización automática
        cargarEstadoDesdeStorage();
    </script>
