<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Audio Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-4">

    <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-lg border border-gray-700">
        <h1 class="text-2xl font-bold text-blue-400 mb-6 text-center">Generador de Audio</h1>
        
        <div class="space-y-4">
            <textarea id="textInput" rows="4" 
                class="w-full px-4 py-3 bg-gray-900 border border-gray-600 rounded-xl focus:border-blue-500 outline-none transition-colors" 
                placeholder="Escribe el texto aquí..."></textarea>
            
            <select id="langSelect" class="w-full px-4 py-3 bg-gray-900 border border-gray-600 rounded-xl outline-none focus:border-blue-500">
              <option value="es-ES">🇪🇸 Español (España)</option>
<option value="es-ES">🇪🇸 España (Peninsular)</option>
        <option value="es-MX">🇲🇽 México (Latinoamérica)</option>
        <option value="es-US">🇺🇸 EE.UU. (Neutro)</option>
        <option value="es-AR">🇦🇷 Argentina</option>
        <option value="es-CL">🇨🇱 Chile</option>
        <option value="es-CO">🇨🇴 Colombia</option>
        <option value="es-PE">🇵🇪 Perú</option>
<option value="en-US">🇺🇸 EE.UU. (General)</option>
        <option value="en-GB">🇬🇧 Reino Unido (Británico)</option>
        <option value="en-AU">🇦🇺 Australia</option>
        <option value="en-CA">🇨🇦 Canadá</option>
        <option value="en-IN">🇮🇳 India</option>
        <option value="en-IE">🇮🇪 Irlanda</option>
        <option value="en-NZ">🇳🇿 Nueva Zelanda</option>
        <option value="en-ZA">🇿🇦 Sudáfrica</option>
<option value="pt-BR">🇧🇷 Portugués (Brasil)</option>
<option value="pt-PT">🇵🇹 Portugués (Portugal)</option>
<option value="fr-FR">🇫🇷 Francés (Francia)</option>
<option value="it-IT">🇮🇹 Italiano (Italia)</option>
<option value="de-DE">🇩🇪 Alemán (Alemania)</option>
<option value="ja-JP">🇯🇵 Japonés (Japón)</option>
<option value="ko-KR">🇰🇷 Coreano (Corea)</option>
<option value="zh-CN">🇨🇳 Chino (Mandarín)</option>
<option value="ru-RU">🇷🇺 Ruso (Rusia)</option>
            </select>

            <button id="btnDownload" 
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition-all">
                Descargar MP3
            </button>
        </div>

        <div id="alertBox" class="hidden mt-4 p-3 rounded-lg text-center text-sm border"></div>
    </div>

    <script>
        const textInput = document.getElementById('textInput');
        const langSelect = document.getElementById('langSelect');
        const btnDownload = document.getElementById('btnDownload');
        const alertBox = document.getElementById('alertBox');
        
        // REEMPLAZA ESTA URL CON LA URL DE TU SERVICIO EN RENDER
        const BASE_SERVER_URL = 'https://audiodw.onrender.com';

        btnDownload.addEventListener('click', async () => {
            const texto = textInput.value.trim();
            if (!texto) return showAlert('Por favor, escribe algo.', 'bg-red-900/50 border-red-800 text-red-300');

            btnDownload.textContent = 'Procesando...';
            btnDownload.disabled = true;

            try {
                const response = await fetch(`${BASE_SERVER_URL}/api/generar-mp3`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ texto, idioma: langSelect.value })
                });

                if (!response.ok) throw new Error('Error al conectar con el servidor');

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `audio_${langSelect.value}_${Date.now()}.mp3`;
                document.body.appendChild(a);
                a.click();
                a.remove();
                
                showAlert('¡Descarga completada!', 'bg-green-900/50 border-green-800 text-green-300');
            } catch (err) {
                showAlert('Error: El servidor podría estar dormido.', 'bg-red-900/50 border-red-800 text-red-300');
            } finally {
                btnDownload.textContent = 'Descargar MP3';
                btnDownload.disabled = false;
            }
        });

        function showAlert(msg, style) {
            alertBox.textContent = msg;
            alertBox.className = `mt-4 p-3 rounded-lg text-center text-sm border ${style}`;
            alertBox.classList.remove('hidden');
            setTimeout(() => alertBox.classList.add('hidden'), 4000);
        }
    </script>
</body>
</html>
